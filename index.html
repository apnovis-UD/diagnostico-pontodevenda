<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de PDV — Unpack Design</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  #card {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 580px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 92vh;
    max-height: 720px;
  }

  #top {
    padding: 18px 20px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #EEEDFE;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #avatar svg { width: 20px; height: 20px; }

  #top-info p:first-child { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  #top-info p:last-child { font-size: 12px; color: #888; margin-top: 1px; }

  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; margin-right: 4px; display: inline-block;
  }

  #msgs {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 85%;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .ai {
    align-self: flex-start;
    background: #f4f3f0;
    color: #1a1a1a;
    padding: 12px 16px;
    border-radius: 4px 16px 16px 16px;
  }

  .user {
    align-self: flex-end;
    background: #534AB7;
    color: #fff;
    padding: 12px 16px;
    border-radius: 16px 4px 16px 16px;
  }

  #typing {
    align-self: flex-start;
    background: #f4f3f0;
    padding: 12px 16px;
    border-radius: 4px 16px 16px 16px;
    display: none;
    gap: 5px;
    align-items: center;
  }

  #typing span {
    width: 7px; height: 7px;
    background: #aaa;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.2s infinite;
  }
  #typing span:nth-child(2) { animation-delay: 0.2s; }
  #typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  #bottom {
    padding: 12px 16px 16px;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fafafa;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: #7F77DD; background: #fff; }
  textarea:disabled { opacity: 0.5; }

  button#send {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: #534AB7;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  button#send:hover { background: #3C3489; }
  button#send:disabled { opacity: 0.4; cursor: not-allowed; }

  button#send svg { width: 20px; height: 20px; }

  #hint {
    font-size: 11px;
    color: #bbb;
    text-align: center;
    margin-top: 8px;
  }

  a { color: #534AB7; }

  @media (max-width: 480px) {
    #card { height: 100vh; max-height: 100vh; border-radius: 0; }
    body { padding: 0; }
  }
</style>
</head>
<body>

<div id="card">
  <div id="top">
    <div id="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div id="top-info">
      <p>Diagnóstico de PDV</p>
      <p><span id="status-dot"></span>Unpack Design · IA consultora</p>
    </div>
  </div>

  <div id="msgs">
    <div id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="bottom">
    <div id="input-row">
      <textarea id="txt" rows="1" placeholder="Digite sua resposta..." disabled></textarea>
      <button id="send" disabled aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <p id="hint">Diagnóstico gratuito · metodologia Unpack Design</p>
  </div>
</div>

<script>
const msgsEl = document.getElementById("msgs");
const typing = document.getElementById("typing");
const txt = document.getElementById("txt");
const sendBtn = document.getElementById("send");
const history = [];

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "ai" ? "ai" : "user");
  div.textContent = text;
  msgsEl.insertBefore(div, typing);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function send(userText) {
  if (userText) {
    history.push({ role: "user", content: userText });
    addMsg("user", userText);
  }
  txt.value = "";
  txt.style.height = "auto";
  txt.disabled = true;
  sendBtn.disabled = true;
  typing.style.display = "flex";
  msgsEl.scrollTop = msgsEl.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    const reply = data.reply || "Erro ao obter resposta.";
    history.push({ role: "assistant", content: reply });
    typing.style.display = "none";
    addMsg("ai", reply);
  } catch (e) {
    typing.style.display = "none";
    addMsg("ai", "Ocorreu um erro de conexão. Tente novamente.");
  }

  txt.disabled = false;
  sendBtn.disabled = false;
  txt.focus();
}

sendBtn.onclick = () => { const t = txt.value.trim(); if (t) send(t); };

txt.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const t = txt.value.trim();
    if (t) send(t);
  }
});

txt.addEventListener("input", () => {
  txt.style.height = "auto";
  txt.style.height = Math.min(txt.scrollHeight, 120) + "px";
});

send(null);
</script>
</body>
</html>
